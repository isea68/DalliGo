<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원정보 수정</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: #f3f3f3;
        }

        .container {
            width: 420px;
            margin: 50px auto;
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        label {
            margin-top: 10px;
            display: block;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background: #00acc1;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 15px;
        }

        .btn:hover {
            background: #008c9b;
        }

        .back-btn {
            width: 100%;
            padding: 10px;
            background: #777;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
            text-align: center;
            text-decoration: none;
            display: block;
        }

        .back-btn:hover {
            background: #555;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>회원정보 수정</h2>

    <form th:action="@{/user/update}" method="post">
        <label>아이디</label>
        <input type="text" name="userId"
               th:value="${user.userId}" readonly>

        <label>비밀번호</label>
        <input type="password" name="password"
               th:value="${user.password}" required
               pattern="^(?=.*[A-Za-z])(?=.*\\d)[A-Za-z\\d]+$"
               placeholder="영문+숫자 조합">

        <label>이름</label>
        <input type="text" name="name"
               th:value="${user.name}" required
               pattern="^[A-Za-z가-힣]+$"
               placeholder="이름(한글 또는 영문)">

        <label>닉네임</label>
        <input type="text" name="nickName"
               th:value="${user.nickName}" required
               placeholder="닉네임 입력">

        <label>주소</label>
        <input type="text" name="address"
               th:value="${user.address}" placeholder="주소 입력">

        <label>전화번호</label>
        <input type="text" name="phone"
               th:value="${user.phone}"
               pattern="^01[0-9]{8,9}$"
               placeholder="'-' 없이 숫자만 입력">

        <button type="submit" class="btn">수정 완료</button>
        <a th:href="@{/mypage}" class="back-btn">취소</a>
    </form>
</div>

</body>
</html>
