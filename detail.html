<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<title>대회 일정 상세</title>
<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    background-color: #f4f7f9;
    color: #333;
}
header {
    background-color: #00acc1;
    color: white;
    padding: 15px 50px;
    text-align: center;
}
header h1 {
    margin: 0;
}
.container {
    padding: 30px 20px;
    max-width: 900px;
    margin: auto;
}
.card {
    background-color: white;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    padding: 25px;
    margin-bottom: 25px;
}
.card h2 {
    margin-top: 0;
    font-size: 1.8em;
}
.card p {
    margin: 5px 0;
}
.card ul {
    padding-left: 20px;
}
.card a {
    color: #00acc1;
    text-decoration: none;
}
.card a:hover {
    text-decoration: underline;
}
</style>
</head>
<body>

<header>
    <h1>대회 일정 상세</h1>
</header>

// 렌더링 함수
const container = document.getElementById('marathon-list');

marathonData.forEach(event => {
    const card = document.createElement('div');
    card.className = 'card';

    card.innerHTML = `
        <h2>${event.name}</h2>
        <p><strong>날짜:</strong> ${event.date}</p>
        <p><strong>장소:</strong> ${event.location}</p>
        <p><strong>거리:</strong></p>
        <ul>${event.distance.map(d => `<li>${d}</li>`).join('')}</ul>
        <p><strong>참가비:</strong></p>
        <ul>${event.fee.map(f => `<li>${f}</li>`).join('')}</ul>
        <p><strong>주관 기관:</strong> <a href="${event.organizer_url}" target="_blank">${event.organizer_url}</a></p>
        <p><strong>예상 날씨:</strong> ${event.weather.temp} / ${event.weather.condition}</p>
    `;
